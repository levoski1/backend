# Dependabot configuration — Issue #263
# Automatically opens PRs for npm and GitHub Actions dependency updates.
# Any PR that introduces a package with a known CVE will be flagged by
# the vulnerability-scan.yml workflow and must be resolved before merging.

version: 2
updates:
  # npm dependencies (backend)
  - package-ecosystem: "npm"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "UTC"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "security"
    commit-message:
      prefix: "chore(deps)"
    ignore:
      # Ignore major version bumps for packages that require manual migration
      - dependency-name: "sequelize"
        update-types: ["version-update:semver-major"]
      - dependency-name: "express"
        update-types: ["version-update:semver-major"]

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "chore(ci)"
