name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    timeout-minutes: 10

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: shelter_test
          POSTGRES_USER: shelter
          POSTGRES_PASSWORD: shelter_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Run unit tests
        run: npm run test:unit
        env:
          NODE_ENV: test
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: shelter_test
          DB_USER: shelter
          DB_PASSWORD: shelter_test
          JWT_ACCESS_SECRET: ci-access-secret-thirty-two-chars-min
          JWT_REFRESH_SECRET: ci-refresh-secret-thirty-two-chars-min

      - name: Run tests with coverage
        run: npm run test:cov
        env:
          NODE_ENV: test
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: shelter_test
          DB_USER: shelter
          DB_PASSWORD: shelter_test
          JWT_ACCESS_SECRET: ci-access-secret-thirty-two-chars-min
          JWT_REFRESH_SECRET: ci-refresh-secret-thirty-two-chars-min

      - name: Build
        run: npm run build

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [validate]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/Dockerfile
          push: false
          tags: shelter-api:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
