name: "Quality Gate"

on:
  push:
    branches: [main, develop, "feature/*", "release/*"]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  lint:
    name: "Lint & Static Analysis"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Run npm audit
        run: npm audit --audit-level=high --omit=dev || true

  unit-tests:
    name: "Backend Unit Tests"
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: shelter_test
          POSTGRES_USER: shelter
          POSTGRES_PASSWORD: shelter_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Jest unit tests
        run: npm run test:unit
        env:
          NODE_ENV: test
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: shelter_test
          DB_USER: shelter
          DB_PASSWORD: shelter_test
          JWT_ACCESS_SECRET: ci-access-secret-thirty-two-chars-min
          JWT_REFRESH_SECRET: ci-refresh-secret-thirty-two-chars-min

      - name: Run tests with coverage
        run: npm run test:cov
        env:
          NODE_ENV: test
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: shelter_test
          DB_USER: shelter
          DB_PASSWORD: shelter_test
          JWT_ACCESS_SECRET: ci-access-secret-thirty-two-chars-min
          JWT_REFRESH_SECRET: ci-refresh-secret-thirty-two-chars-min

      - name: Build
        run: npm run build

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: unit-coverage
          path: coverage/
          retention-days: 7

  green-light:
    name: "GREEN LIGHT — All Gates Passed"
    runs-on: ubuntu-latest
    needs: [lint, unit-tests]
    if: |
      always() &&
      needs.lint.result == 'success' &&
      needs.unit-tests.result == 'success'

    steps:
      - name: All gates passed
        run: |
          echo "╔══════════════════════════════════════════════════════╗"
          echo "║                                                      ║"
          echo "║   ✅  GREEN LIGHT — All Checks Passed               ║"
          echo "║                                                      ║"
          echo "║   Branch: ${{ github.ref_name }}"
          echo "║   Commit: ${{ github.sha }}"
          echo "╚══════════════════════════════════════════════════════╝"

  red-light:
    name: "RED LIGHT — Checks Failed"
    runs-on: ubuntu-latest
    needs: [lint, unit-tests]
    if: |
      always() && (
        needs.lint.result == 'failure' ||
        needs.unit-tests.result == 'failure'
      )

    steps:
      - name: Report blocking failures
        run: |
          echo "╔══════════════════════════════════════════════════════╗"
          echo "║                                                      ║"
          echo "║   🔴  RED LIGHT — Checks Failed                     ║"
          echo "║                                                      ║"
          echo "║   Lint:   ${{ needs.lint.result }}"
          echo "║   Unit:   ${{ needs.unit-tests.result }}"
          echo "╚══════════════════════════════════════════════════════╝"
          exit 1
