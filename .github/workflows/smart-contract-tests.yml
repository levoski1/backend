name: Backend Tests

on:
  push:
    branches: ["main", "develop", "feature/*"]
  pull_request:
    branches: ["main", "develop"]

jobs:
  backend-tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: shelter_test
          POSTGRES_USER: shelter
          POSTGRES_PASSWORD: shelter_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit
        env:
          NODE_ENV: test
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: shelter_test
          DB_USER: shelter
          DB_PASSWORD: shelter_test
          JWT_ACCESS_SECRET: ci-access-secret-thirty-two-chars-min
          JWT_REFRESH_SECRET: ci-refresh-secret-thirty-two-chars-min

      - name: Generate coverage report
        run: npm run test:cov
        env:
          NODE_ENV: test
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: shelter_test
          DB_USER: shelter
          DB_PASSWORD: shelter_test
          JWT_ACCESS_SECRET: ci-access-secret-thirty-two-chars-min
          JWT_REFRESH_SECRET: ci-refresh-secret-thirty-two-chars-min
